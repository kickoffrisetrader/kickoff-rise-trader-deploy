<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Unity Web Player | Kickoff Rise Trader</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico" />
  <link rel="stylesheet" href="TemplateData/style.css" />
  <link rel="manifest" href="manifest.webmanifest" />

  <meta name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #unity-loading-bar,
    #unity-warning {
      position: absolute;
      z-index: 10;
    }

    @media screen and (orientation: portrait) {
      #unity-container {
        width: 100vh;
        height: 100vw;
        transform: rotate(90deg);
        transform-origin: center center;
        position: fixed;
        top: 50%;
        left: 50%;
        margin-left: -50vh;
        margin-top: -50vw;
      }
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <script>
    window.addEventListener("load", function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("ServiceWorker.js");
      }
    });

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display =
          warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);

      if (type === "error") {
        div.style = "background: red; padding: 10px;";
      } else {
        if (type === "warning") {
          div.style = "background: yellow; padding: 10px;";
        }

        setTimeout(() => {
          if (warningBanner.contains(div)) {
            warningBanner.removeChild(div);
          }
          updateBannerVisibility();
        }, 5000);
      }

      updateBannerVisibility();
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Build.loader.js";

    const config = {
      arguments: [],
      dataUrl: buildUrl + "/Build.data",
      frameworkUrl: buildUrl + "/Build.framework.js",
      codeUrl: buildUrl + "/Build.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Kickoff Rise Trader",
      productVersion: "1.0.0",
      showBanner: unityShowBanner,
      devicePixelRatio: 1,
      matchWebGLToCanvasSize: true,
    };

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = progress * 100 + "%";
      })
        .then(() => {
          loadingBar.style.display = "none";
        })
        .catch((message) => {
          alert(message);
        });
    };

    document.body.appendChild(script);
  </script>
</body>

</html>
