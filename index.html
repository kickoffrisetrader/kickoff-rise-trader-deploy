<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Kickoff Rise Trader</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="manifest" href="manifest.webmanifest">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    /* Popup xoay màn hình */
    #rotate-popup {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #rotate-popup-content {
      max-width: 320px;
    }

    #rotate-popup-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    #rotate-popup-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    #rotate-popup-text {
      font-size: 18px;
      line-height: 1.5;
      opacity: 0.9;
    }

    #fullscreen-btn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    #fullscreen-btn:hover {
      background: rgba(0, 0, 0, 0.85);
    }

    #fullscreen-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="1920" height="1080" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <!-- Popup xoay màn hình -->
  <div id="rotate-popup">
    <div id="rotate-popup-content">
      <div id="rotate-popup-icon">📱↻</div>
      <div id="rotate-popup-title">Rotate Device</div>
      <div id="rotate-popup-text">
        Please rotate your device to landscape mode to play the game.
      </div>
    </div>
  </div>

  <button id="fullscreen-btn" type="button">⛶</button>

  <script>
    const BUILD_VERSION = "2.0.0";

    window.addEventListener("load", function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("ServiceWorker.js?v=" + BUILD_VERSION, {
          updateViaCache: "none"
        });
      }
    });

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");
    const rotatePopup = document.querySelector("#rotate-popup");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display =
          warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);

      if (type === "error") {
        div.style = "background: red; padding: 10px;";
      } else {
        if (type === "warning") {
          div.style = "background: yellow; padding: 10px;";
        }

        setTimeout(() => {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }

      updateBannerVisibility();
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/KickoffRiseTrader.WebGL.loader.js?v=" + BUILD_VERSION;

    const config = {
      arguments: [],
      dataUrl: buildUrl + "/KickoffRiseTrader.WebGL.data?v=" + BUILD_VERSION,
      frameworkUrl: buildUrl + "/KickoffRiseTrader.WebGL.framework.js?v=" + BUILD_VERSION,
      codeUrl: buildUrl + "/KickoffRiseTrader.WebGL.wasm?v=" + BUILD_VERSION,
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Kickoff Rise Trader",
      productVersion: BUILD_VERSION,
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      const meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content =
        "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
      document.head.appendChild(meta);
    }

    function updateOrientationPopup() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const isPortrait = window.innerHeight > window.innerWidth;

      if (isMobile && isPortrait) {
        rotatePopup.style.display = "flex";
      } else {
        rotatePopup.style.display = "none";
      }
    }

    window.addEventListener("resize", updateOrientationPopup);
    window.addEventListener("orientationchange", updateOrientationPopup);

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      })
        .then((unityInstance) => {
          loadingBar.style.display = "none";
          updateOrientationPopup();
        })
        .catch((message) => {
          alert(message);
        });
    };

    document.body.appendChild(script);

    // Fullscreen toggle logic
    const fullscreenBtn = document.getElementById("fullscreen-btn");

    function isFullscreen() {
      return !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.msFullscreenElement
      );
    }

    function updateFullscreenButton() {
      fullscreenBtn.textContent = isFullscreen() ? "✕" : "⛶";
    }

    function enterFullscreen() {
      const element = document.documentElement;

      if (element.requestFullscreen) {
        return element.requestFullscreen();
      }

      if (element.webkitRequestFullscreen) {
        return element.webkitRequestFullscreen();
      }

      if (element.msRequestFullscreen) {
        return element.msRequestFullscreen();
      }
    }

    function exitFullscreen() {
      if (document.exitFullscreen) {
        return document.exitFullscreen();
      }

      if (document.webkitExitFullscreen) {
        return document.webkitExitFullscreen();
      }

      if (document.msExitFullscreen) {
        return document.msExitFullscreen();
      }
    }

    async function toggleFullscreen() {
      try {
        if (isFullscreen()) {
          await exitFullscreen();
        } else {
          await enterFullscreen();
        }
      } catch (error) {
        console.error("Fullscreen error:", error);
      }

      updateFullscreenButton();
    }

    fullscreenBtn.addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", updateFullscreenButton);
    document.addEventListener("webkitfullscreenchange", updateFullscreenButton);
    document.addEventListener("msfullscreenchange", updateFullscreenButton);
    updateFullscreenButton();
  </script>
</body>

</html>
